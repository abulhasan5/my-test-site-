<!DOCTYPE html><html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART BD</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script><style>
:root{--primary:#1565c0;--bg:#f4f6fb;}
body{margin:0;font-family:sans-serif;background:var(--bg);}

.header{
 background:linear-gradient(135deg,#1e88e5,#1565c0);
 padding:18px;color:#fff;
 display:flex;justify-content:space-between;align-items:center;
 border-bottom-left-radius:20px;
 border-bottom-right-radius:20px;
}
.brand{font-size:20px;font-weight:bold;}

.banner img{width:100%;border-radius:15px;margin:10px 0;}
.section{padding:10px;}

.social{
 display:flex;justify-content:space-around;background:#fff;
 padding:15px;border-radius:15px;
 box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
.social i{font-size:28px;color:var(--primary);}

.notice{
 margin-top:10px;
 padding:18px;color:#fff;border-radius:15px;
 background:linear-gradient(135deg,#1e88e5,#5e35b1);
}

.grid{
 display:grid;grid-template-columns:repeat(4,1fr);
 gap:10px;margin-top:10px;
}
.box{
 background:#fff;border-radius:15px;padding:10px;text-align:center;
 box-shadow:0 3px 10px rgba(0,0,0,0.1);
 font-size:12px;
}
.box i{font-size:22px;color:var(--primary);margin-bottom:5px;}

.bottom{
 position:fixed;bottom:0;width:100%;background:#fff;
 display:flex;justify-content:space-around;padding:10px;
 box-shadow:0 -5px 10px rgba(0,0,0,0.1);
 border-top-left-radius:15px;
 border-top-right-radius:15px;
}
.nav{text-align:center;color:#777;font-size:12px;}
.nav.active{color:var(--primary);}

.login{
 display:flex;flex-direction:column;gap:10px;padding:20px;
}
.input{padding:12px;border-radius:10px;border:1px solid #ccc;}
.btn{padding:12px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-weight:bold;}
</style><script>
const firebaseConfig={
 apiKey:"AIzaSyDZ3rPr7ZmpvEVAs2bkGRgAuwSha9vm-Eg",
 authDomain:"stepupbd-211d1.firebaseapp.com",
 databaseURL:"https://stepupbd-211d1-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();

// AUTO LOGIN
firebase.auth().onAuthStateChanged(user=>{
 if(user){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('homePage').style.display='block';
 }
});

function login(){
 let email=document.getElementById('email').value;
 let pass=document.getElementById('pass').value;

 if(!email || !pass){alert('ইমেইল ও পাসওয়ার্ড দিন');return;}

 auth.signInWithEmailAndPassword(email,pass)
 .then(()=>{
  alert('লগইন সফল ✅');
  document.getElementById('loginPage').style.display='none';
  document.getElementById('homePage').style.display='block';
 })
 .catch((error)=>alert(error.message));
}

function register(){
 let email=document.getElementById('email').value;
 let pass=document.getElementById('pass').value;

 if(!email || !pass){alert('ইমেইল ও পাসওয়ার্ড দিন');return;}
 if(pass.length<6){alert('পাসওয়ার্ড ৬ ডিজিট হতে হবে');return;}

 auth.createUserWithEmailAndPassword(email,pass)
 .then(()=>alert('রেজিস্টার সফল ✅ এখন লগইন করুন'))
 .catch((error)=>alert(error.message));
}

function logout(){
 auth.signOut().then(()=>location.reload());
}
</script></head><body><div id="loginPage" class="login">
 <h2>SMART BD লগইন</h2>
 <input id="email" class="input" placeholder="Email">
 <input id="pass" type="password" class="input" placeholder="Password">
 <button class="btn" onclick="login()">লগইন</button>
 <button class="btn" onclick="register()">রেজিস্টার</button>
</div><div id="homePage" style="display:none">
 <div class="header">
  <i class="fa fa-bars"></i>
  <div class="brand">SMART BD</div>
  <i class="fa fa-sign-out" onclick="logout()"></i>
 </div> <div class="section">
  <div class="banner">
   <img src="https://img.freepik.com/free-vector/colorful-sale-background-with-product-description_1361-1258.jpg">
  </div>  <div class="social">
   <i class="fab fa-facebook"></i>
   <i class="fab fa-youtube"></i>
   <i class="fab fa-whatsapp"></i>
   <i class="fab fa-telegram"></i>
  </div>  <div class="notice">
   <h3>নোটিশ বোর্ড</h3>
   <p>SMART BD তে আপনাকে স্বাগতম</p>
  </div>  <div class="grid">
   <div class="box"><i class="fa fa-shopping-cart"></i><br>প্রোডাক্ট</div>
   <div class="box"><i class="fa fa-search"></i><br>সার্চ</div>
   <div class="box"><i class="fa fa-crown"></i><br>প্রো</div>
   <div class="box"><i class="fa fa-store"></i><br>ই-কমার্স</div>
   <div class="box"><i class="fa fa-leaf"></i><br>প্যাসিভ</div>
   <div class="box"><i class="fa fa-check"></i><br>ভেরিফাই</div>
   <div class="box"><i class="fa fa-mobile"></i><br>রিচার্জ</div>
   <div class="box"><i class="fa fa-headset"></i><br>সাপোর্ট</div>
  </div>
 </div> <div class="bottom">
  <div class="nav active"><i class="fa fa-home"></i><br>হোম</div>
  <div class="nav"><i class="fa fa-box"></i><br>প্রোডাক্ট</div>
  <div class="nav"><i class="fa fa-chart-line"></i><br>প্রফিট</div>
  <div class="nav"><i class="fa fa-user"></i><br>প্রোফাইল</div>
 </div>
</div></body>
</html>
