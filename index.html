<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBD | আপনার শপ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #fdfaf7; padding-bottom: 70px; }
        .header { background: #ff5e00; color: white; padding: 20px; text-align: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); text-align: center; position: relative; }
        .card img { width: 100%; border-radius: 10px; height: 140px; object-fit: cover; }
        .price { color: #ff5e00; font-weight: bold; font-size: 16px; margin: 5px 0; }
        .buy-btn { background: #ff5e00; color: white; width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: absolute; right: 10px; bottom: 10px; cursor: pointer; }
    </style>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDZ3rPr7ZmpvEVAs2bkGRgAuwSha9vm-Eg",
            authDomain: "stepupbd-211d1.firebaseapp.com",
            projectId: "stepupbd-211d1",
            databaseURL: "https://stepupbd-211d1-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function loadProducts() {
            database.ref('products').on('value', (snapshot) => {
                const grid = document.getElementById('productGrid');
                grid.innerHTML = "";
                const data = snapshot.val();
                if(data) {
                    Object.keys(data).reverse().forEach(id => {
                        const p = data[id];
                        grid.innerHTML += `
                            <div class="card">
                                <img src="${p.img}" alt="product">
                                <h3 style="font-size:14px; margin:5px 0;">${p.name}</h3>
                                <div class="price">৳ ${p.price}</div>
                                <div class="buy-btn" onclick="orderNow('${p.name}', '${p.price}')"><i class="fa fa-plus"></i></div>
                            </div>`;
                    });
                }
            });
        }

        function orderNow(name, price) {
            const n = prompt("আপনার নাম:");
            const p = prompt("মোবাইল নম্বর:");
            const a = prompt("ঠিকানা:");
            if(n && p && a) {
                database.ref('orders').push({ product: name, price: price, name: n, phone: p, address: a, time: new Date().toLocaleString() });
                alert("অর্ডার সফল হয়েছে!");
            }
        }
    </script>
</head>
<body onload="loadProducts()">
    <div class="header"><h1>SmartBD</h1></div>
    <div id="productGrid" class="grid"></div>
</body>
</html>
