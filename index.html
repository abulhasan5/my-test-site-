<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMART BD | E-commerce</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
:root { --primary:#0d47a1; --bg:#f8f9fa; --red:#d32f2f; --green:#2e7d32; }
body{margin:0;font-family:sans-serif;background:var(--bg);padding-bottom:80px}

.header{background:var(--primary);padding:15px;border-radius:0 0 20px 20px}
.brand-name{color:#fff;font-size:24px;font-weight:bold}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px}
.product-card{background:#fff;padding:8px;border-radius:12px}
.product-card img{width:100%;height:120px;object-fit:cover;border-radius:10px}

.buy-btn{background:var(--primary);color:#fff;border:none;padding:8px;border-radius:8px;width:100%;margin-top:5px}

.bottom-nav{position:fixed;bottom:0;width:100%;display:flex;background:#fff}
.nav-item{flex:1;text-align:center;padding:10px}
.nav-item.active{color:var(--primary);font-weight:bold}
</style>

<script>
const firebaseConfig = {
apiKey:"AIzaSy...",
databaseURL:"https://stepupbd-211d1-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let cart=[];

// section
function showSection(id,el){
document.querySelectorAll('.content-section').forEach(s=>s.style.display='none');
document.getElementById(id).style.display='block';
document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
el.classList.add('active');
}

// load product (FIXED)
function loadProducts(){
db.ref('products').once('value').then(snap=>{
let grid=document.getElementById('productGrid');
grid.innerHTML="";

snap.forEach(c=>{
let p=c.val();

grid.innerHTML+=`
<div class="product-card">
<img src="${p.img || p.image}">
<h4>${p.name}</h4>
<p>৳${p.salePrice}</p>

<button class="buy-btn" onclick="addToCart(this)"
data-name="${p.name}"
data-price="${p.salePrice}"
data-img="${p.img || p.image}">
🛒 Add to Cart
</button>

<button class="buy-btn" onclick="orderNow(this)"
data-name="${p.name}"
data-price="${p.salePrice}">
⚡ Order Now
</button>

</div>`;
});
});
}

// CART
function addToCart(btn){
cart.push({
name:btn.dataset.name,
price:btn.dataset.price
});
alert("কার্টে যোগ হয়েছে 🛒");
renderCart();
}

function renderCart(){
let sec=document.getElementById('cartSection');

if(cart.length==0){
sec.innerHTML="<p>কার্ট খালি</p>";
return;
}

let html="<h3>MY CART</h3>";

cart.forEach((c,i)=>{
html+=`${c.name} - ৳${c.price}
<button onclick="removeCart(${i})">❌</button><br>`;
});

html+=`<button onclick="checkout()">Checkout</button>`;
sec.innerHTML=html;
}

function removeCart(i){
cart.splice(i,1);
renderCart();
}

// PAYMENT + ORDER
function checkout(){

alert("💳 Payment করুন:\nbKash: 01XXXXXXXXX\nNagad: 01XXXXXXXXX");

let n=prompt("নাম");
let p=prompt("ফোন");
let a=prompt("ঠিকানা");
let trx=prompt("Transaction ID");

cart.forEach(c=>{
db.ref('orders').push({
product:c.name,
price:c.price,
customer:n,
phone:p,
address:a,
trx:trx,
status:"Paid",
time:Date.now()
});
});

alert("অর্ডার সম্পন্ন ✅");
cart=[];
renderCart();
}

// direct order
function orderNow(btn){

alert("💳 Payment করুন:\nbKash: 01XXXXXXXXX");

let n=prompt("নাম");
let p=prompt("ফোন");
let a=prompt("ঠিকানা");
let trx=prompt("Transaction ID");

db.ref('orders').push({
product:btn.dataset.name,
price:btn.dataset.price,
customer:n,
phone:p,
address:a,
trx:trx,
status:"Paid"
});

alert("অর্ডার সফল ✅");
}

// TRACK
function trackOrder(){
let phone=document.getElementById('phoneInput').value;
let res=document.getElementById('trackResult');

db.ref('orders').once('value').then(snap=>{
res.innerHTML="";
snap.forEach(c=>{
let o=c.val();
if(o.phone==phone){
res.innerHTML+=`<p>${o.product} - ${o.status}</p>`;
}
});
});
}

// FIX LOAD
window.addEventListener("load", loadProducts);
</script>

</head>

<body>

<div class="header">
<span class="brand-name">SMART BD</span>
</div>

<div id="homeSection" class="content-section">
<div id="productGrid" class="grid"></div>
</div>

<div id="cartSection" class="content-section" style="display:none"></div>

<div id="orderSection" class="content-section" style="display:none">
<input id="phoneInput" placeholder="ফোন">
<button onclick="trackOrder()">Track</button>
<div id="trackResult"></div>
</div>

<div class="bottom-nav">
<div class="nav-item active" onclick="showSection('homeSection',this)">Home</div>
<div class="nav-item" onclick="showSection('cartSection',this)">Cart</div>
<div class="nav-item" onclick="showSection('orderSection',this)">Orders</div>
</div>

</body>
</html>
