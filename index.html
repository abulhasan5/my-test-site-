<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUY BD - Premium Reselling</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #ff8000; --bg: #f8f9fa; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); padding-bottom: 70px; }

        /* হেডার ডিজাইন (আপনার ছবির মতো) */
        .header { background: var(--primary); padding: 25px 15px; color: white; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; position: sticky; top: 0; z-index: 1000; }
        .app-title { font-size: 26px; font-weight: 800; margin-bottom: 15px; letter-spacing: 1px; }
        .search-box { background: white; display: flex; align-items: center; padding: 12px 18px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .search-box input { border: none; outline: none; width: 100%; margin-left: 10px; font-size: 15px; color: #333; }

        /* ব্যানার স্লাইডার সিমুলেশন */
        .banner { margin: 15px; border-radius: 20px; overflow: hidden; height: 160px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .banner img { width: 100%; height: 100%; object-fit: cover; }

        /* ক্যাটাগরি আইকন (আপনার ছবির মতো) */
        .cat-row { display: flex; justify-content: space-around; padding: 10px 5px; margin-bottom: 15px; overflow-x: auto; }
        .cat-item { text-align: center; min-width: 75px; cursor: pointer; }
        .cat-icon { width: 60px; height: 60px; border-radius: 18px; background: white; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--primary); margin: 0 auto 8px; transition: 0.3s; }
        .cat-item.active .cat-icon { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.1); }
        .cat-item span { font-size: 13px; font-weight: 600; color: #444; }

        /* প্রোডাক্ট কার্ড গ্রিড */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px; }
        .card { background: white; border-radius: 20px; padding: 12px; position: relative; border: 1px solid #f0f0f0; transition: 0.3s; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 15px; cursor: pointer; }
        .p-name { font-size: 14px; margin: 12px 0 6px; color: #333; height: 38px; overflow: hidden; font-weight: 600; line-height: 1.4; }
        .price-row { display: flex; align-items: center; gap: 8px; }
        .price { color: var(--primary); font-weight: 800; font-size: 17px; }
        .old-price { color: #bbb; text-decoration: line-through; font-size: 12px; }
        .plus-btn { position: absolute; bottom: 12px; right: 12px; background: var(--primary); color: white; width: 35px; height: 35px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }

        /* প্রোডাক্ট ডিটেইলস মডাল */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index: 2000; overflow-y: auto; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-content { padding: 20px; }
        .back-btn { font-size: 24px; color: #333; margin-bottom: 20px; cursor: pointer; }
        .size-btn, .color-btn { border: 1.5px solid #eee; padding: 10px 18px; border-radius: 12px; cursor: pointer; display: inline-block; margin: 8px 8px 0 0; font-size: 14px; transition: 0.2s; }
        .selected { border-color: var(--primary); color: var(--primary); background: #fff5eb; font-weight: bold; }

        /* কার্ট ডিজাইন */
        .cart-item { display: flex; align-items: center; background: white; margin: 15px; padding: 15px; border-radius: 20px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .cart-item img { width: 75px; height: 75px; border-radius: 12px; object-fit: cover; }
        .cart-info { flex: 1; margin-left: 15px; }
        .cart-info h4 { margin: 0; font-size: 15px; color: #333; }
        .cart-info p { margin: 5px 0 0; color: var(--primary); font-weight: 700; }
        .remove-btn { color: #ff4d4d; font-size: 20px; cursor: pointer; padding: 10px; }

        /* বটম নেভিগেশন (আপনার ছবির মতো) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1500; }
        .nav-tab { text-align: center; color: #bbb; flex: 1; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .nav-tab.active { color: var(--primary); font-weight: 700; }
        .nav-tab i { font-size: 24px; margin-bottom: 4px; }

        .page { display: none; }
        .active-page { display: block; }

        /* অর্ডার লিস্ট পেজ */
        .order-empty { text-align: center; margin-top: 100px; color: #999; }
    </style>
</head>
<body>

    <div id="home" class="page active-page">
        <div class="header">
            <div class="app-title">BUY BD</div>
            <div class="search-box"><i class="fa fa-search"></i><input type="text" placeholder="আপনার পছন্দের পণ্য খুঁজুন..." onkeyup="searchProduct(this.value)"></div>
        </div>
        
        <div class="banner">
            <img src="https://img.freepik.com/free-vector/shopping-online-banner-template_23-2148401327.jpg" alt="Welcome Offer">
        </div>

        <div class="cat-row">
            <div class="cat-item active" onclick="filterCat('All', this)"><div class="cat-icon"><i class="fa fa-th-large"></i></div><span>All</span></div>
            <div class="cat-item" onclick="filterCat('Fashion', this)"><div class="cat-icon"><i class="fa fa-tshirt"></i></div><span>Fashion</span></div>
            <div class="cat-item" onclick="filterCat('Sports', this)"><div class="cat-icon"><i class="fa fa-football-ball"></i></div><span>Sports</span></div>
            <div class="cat-item" onclick="filterCat('Winter', this)"><div class="cat-icon"><i class="fa fa-snowflake"></i></div><span>Winter</span></div>
        </div>

        <div style="padding: 0 20px 10px; font-weight: 800; font-size: 18px; color: #333;">ALL PRODUCT</div>
        <div class="grid" id="productGrid"></div>
    </div>

    <div id="cart" class="page">
        <div class="header" style="padding: 15px;"><div class="app-title">আপনার কার্ট</div></div>
        <div id="cartList"></div>
        <div id="cartEmptyMsg" style="text-align: center; padding-top: 100px;">
            <i class="fa fa-shopping-basket" style="font-size: 60px; color: #eee;"></i>
            <p style="color: #999; margin-top: 15px;">কার্ট বর্তমানে খালি আছে</p>
        </div>
        <div id="cartTotalUI" style="padding: 20px; position: fixed; bottom: 70px; width: 100%; background: white; border-top: 1px solid #eee; display: none; box-sizing: border-box;">
            <div style="display: flex; justify-content: space-between; font-size: 19px; font-weight: bold; margin-bottom: 15px;">
                <span>মোট পরিমাণ:</span><span id="totalValue" style="color: var(--primary);">৳ 0</span>
            </div>
            <button onclick="alert('অর্ডার সিস্টেম শীঘ্রই আসবে!')" style="width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 16px;">অর্ডার কনফার্ম করুন</button>
        </div>
    </div>

    <div id="orders" class="page">
        <div class="header" style="padding: 15px;"><div class="app-title">অর্ডার লিস্ট (BUY BD)</div></div>
        <div class="order-empty">
            <i class="fa fa-box-open" style="font-size: 50px; opacity: 0.2;"></i>
            <p>কোনো অর্ডার নেই।</p>
        </div>
    </div>

    <div id="account" class="page">
        <div class="header" style="padding: 30px 15px; text-align: center;">
            <div style="width: 80px; height: 80px; background: white; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 40px;"><i class="fa fa-user"></i></div>
            <div class="app-title" style="margin:0">Buybd.App</div>
            <small>buybd.app@gmail.com</small>
        </div>
        <div style="padding: 20px;">
            <div style="background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between;">
                <span><i class="fa fa-headset" style="margin-right: 10px; color: #25D366;"></i> হটলাইন ও সাপোর্ট (WhatsApp)</span>
                <i class="fa fa-chevron-right" style="color: #ccc;"></i>
            </div>
            <div style="background: white; border-radius: 15px; padding: 15px; color: red;">
                <i class="fa fa-sign-out-alt" style="margin-right: 10px;"></i> লগ আউট করুন
            </div>
        </div>
    </div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <i class="fa fa-arrow-left back-btn" onclick="closeModal()"></i>
            <img id="detImg" src="" style="width: 100%; border-radius: 20px; height: 350px; object-fit: cover;">
            <h2 id="detTitle" style="margin: 20px 0 10px;"></h2>
            <h3 id="detPrice" style="color: var(--primary); font-size: 24px; margin-top: 0;"></h3>
            
            <div id="colorDiv" style="margin-top: 20px;">
                <p style="font-weight: bold;">রঙ নির্বাচন করুন:</p>
                <div id="colorBox"></div>
            </div>
            
            <div id="sizeDiv" style="margin-top: 20px;">
                <p style="font-weight: bold;">আকার নির্বাচন করুন:</p>
                <div id="sizeBox"></div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 30px;">
                <button onclick="addToCartFunc()" style="flex: 1; padding: 18px; border: 2px solid var(--primary); background: transparent; color: var(--primary); border-radius: 15px; font-weight: bold;"><i class="fa fa-shopping-cart"></i> কার্ট</button>
                <button onclick="alert('সরাসরি অর্ডার করার সিস্টেম যোগ হচ্ছে...')" style="flex: 2; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: bold;">এখনই অর্ডার করুন</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-tab active" id="btn-home" onclick="showPage('home')"><i class="fa fa-home"></i><br>Home</div>
        <div class="nav-tab" id="btn-cart" onclick="showPage('cart')"><i class="fa fa-shopping-bag"></i><br>Cart</div>
        <div class="nav-tab" id="btn-orders" onclick="showPage('orders')"><i class="fa fa-truck"></i><br>Orders</div>
        <div class="nav-tab" id="btn-account" onclick="showPage('account')"><i class="fa fa-user-circle"></i><br>Account</div>
    </div>

    <script>
        // Firebase Configuration (আপনার ডাটাবেস লিংক ঠিক আছে)
        const firebaseConfig = {
            apiKey: "AIzaSyDZ3rPr7ZmpvEVAs2bkGRgAuwSha9vm-Eg",
            authDomain: "stepupbd-211d1.firebaseapp.com",
            databaseURL: "https://stepupbd-211d1-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let cart = []; 
        let activeItem = null;

        // ১. ডাটা লোড করা
        function fetchProducts() {
            db.ref('products').on('value', (snap) => {
                const grid = document.getElementById('productGrid');
                grid.innerHTML = "";
                snap.forEach(child => {
                    const p = child.val();
                    const pImg = p.img || p.image || 'https://via.placeholder.com/150';
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${pImg}" onclick="openModal('${p.name}', '${p.salePrice}', '${pImg}', '${p.color}', '${p.size}')">
                            <div class="plus-btn" onclick="openModal('${p.name}', '${p.salePrice}', '${pImg}', '${p.color}', '${p.size}')">+</div>
                            <div class="p-name">${p.name}</div>
                            <div class="price-row">
                                <span class="price">৳${p.salePrice}</span>
                                <span class="old-price">৳${parseInt(p.salePrice)+100}</span>
                            </div>
                        </div>`;
                });
            });
        }

        // ২. মডাল ওপেন (Undefined ফিক্সড)
        function openModal(name, price, img, colors, sizes) {
            activeItem = { name, price: parseInt(price), img, color: "", size: "" };
            document.getElementById('detTitle').innerText = name;
            document.getElementById('detPrice').innerText = '৳ ' + price;
            document.getElementById('detImg').src = img;

            // কালার রেন্ডার
            const cBox = document.getElementById('colorBox');
            cBox.innerHTML = "";
            if (colors && colors !== "undefined" && colors.trim() !== "") {
                document.getElementById('colorDiv').style.display = "block";
                colors.split(',').forEach(c => {
                    cBox.innerHTML += `<div class="color-btn" onclick="selectAttr(this, 'color', '${c.trim()}')">${c.trim()}</div>`;
                });
            } else { document.getElementById('colorDiv').style.display = "none"; }

            // সাইজ রেন্ডার
            const sBox = document.getElementById('sizeBox');
            sBox.innerHTML = "";
            if (sizes && sizes !== "undefined" && sizes.trim() !== "") {
                document.getElementById('sizeDiv').style.display = "block";
                sizes.split(',').forEach(s => {
                    sBox.innerHTML += `<div class="size-btn" onclick="selectAttr(this, 'size', '${s.trim()}')">${s.trim()}</div>`;
                });
            } else { document.getElementById('sizeDiv').style.display = "none"; }

            document.getElementById('detailsModal').style.display = 'block';
        }

        function selectAttr(el, type, val) {
            const cls = type === 'color' ? '.color-btn' : '.size-btn';
            document.querySelectorAll(cls).forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
            if(type === 'color') activeItem.color = val; else activeItem.size = val;
        }

        // ৩. কার্ট লজিক
        function addToCartFunc() {
            cart.push({...activeItem});
            updateCartUI();
            closeModal();
            showPage('cart');
            alert("সফলভাবে কার্টে যোগ হয়েছে!");
        }

        function updateCartUI() {
            const list = document.getElementById('cartList');
            const totalUI = document.getElementById('cartTotalUI');
            const emptyMsg = document.getElementById('cartEmptyMsg');
            
            if(cart.length === 0) {
                list.innerHTML = ""; totalUI.style.display = "none"; emptyMsg.style.display = "block";
                return;
            }

            emptyMsg.style.display = "none";
            totalUI.style.display = "block";
            list.innerHTML = "";
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                list.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}">
                        <div class="cart-info">
                            <h4>${item.name}</h4>
                            <small style="color:#888">${item.color ? 'কালার: '+item.color : ''} ${item.size ? ' | সাইজ: '+item.size : ''}</small>
                            <p>৳${item.price}</p>
                        </div>
                        <i class="fa fa-trash-alt remove-btn" onclick="removeItem(${index})"></i>
                    </div>`;
            });
            document.getElementById('totalValue').innerText = "৳ " + total;
        }

        function removeItem(i) {
            cart.splice(i, 1);
            updateCartUI();
        }

        // ৪. নেভিগেশন ও অন্যান্য
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('btn-' + pageId).classList.add('active');
            window.scrollTo(0,0);
        }

        function filterCat(cat, el) {
            document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            // এখানে ফিল্টার লজিক যোগ করা যাবে
        }

        function searchProduct(v) {
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(v.toLowerCase()) ? "block" : "none";
            });
        }

        function closeModal() { document.getElementById('detailsModal').style.display = 'none'; }

        window.onload = fetchProducts;
    </script>
</body>
                                                                                                           </html>
