<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StepUpBD | শপিং</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // আপনার পাঠানো সেই স্পেশাল কনফিগ কোড
        const firebaseConfig = {
            apiKey: "AIzaSyDZ3rPr7ZmpvEVAs2bkGRgAuwSha9vm-Eg",
            authDomain: "stepupbd-211d1.firebaseapp.com",
            projectId: "stepupbd-211d1",
            storageBucket: "stepupbd-211d1.firebasestorage.app",
            messagingSenderId: "533863292447",
            appId: "1:533863292447:web:cf5946f03e9a8a32707f2a",
            databaseURL: "https://stepupbd-211d1-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function sendOrder() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;

            if(name && phone && address) {
                database.ref('orders').push({
                    name: name,
                    phone: phone,
                    address: address,
                    product: "M10 Earbuds",
                    time: new Date().toLocaleString()
                }).then(() => {
                    alert("অর্ডার সফল! এডমিন প্যানেল চেক করুন।");
                    document.getElementById('orderForm').reset();
                });
            } else {
                alert("সব তথ্য সঠিকভাবে দিন।");
            }
        }
    </script>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; max-width: 400px; width: 100%; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 5px solid #003399; }
        h2 { color: #003399; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #003399; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #002266; }
    </style>
</head>
<body>
    <div class="card">
        <h2>StepUpBD Shop</h2>
        <p style="text-align:center;"><b>M10 Earbuds (TWS) - ৳ ৫৫০</b></p>
        <form id="orderForm">
            <input type="text" id="name" placeholder="আপনার নাম" required>
            <input type="text" id="phone" placeholder="মোবাইল নম্বর" required>
            <input type="text" id="address" placeholder="পূর্ণ ঠিকানা" required>
            <button type="button" onclick="sendOrder()">অর্ডার কনফার্ম করুন</button>
        </form>
    </div>
</body>
</html>
