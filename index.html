<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBD | আপনার পছন্দের সেরা শপ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        /* আপনার অরেঞ্জ এবং হোয়াইট থিম ডিজাইন */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #fdfaf7; color: #333; padding-bottom: 70px; }
        
        /* হেডার ও সার্চ বার */
        .header { background: linear-gradient(135deg, #ff8c00, #ff5e00); color: white; padding: 20px 15px; border-bottom-right-radius: 25px; border-bottom-left-radius: 25px; box-shadow: 0 4px 12px rgba(255, 106, 0, 0.2); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header-top h1 { margin: 0; font-size: 26px; font-weight: 800; letter-spacing: 1px; }
        
        .search-container { position: relative; width: 100%; }
        .search-container input { width: 100%; padding: 12px 20px; border: none; border-radius: 30px; font-size: 15px; outline: none; }
        .search-container i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #ff5e00; font-size: 18px; }

        /* ক্যাটাগরি সেকশন */
        .categories { display: flex; justify-content: space-around; padding: 20px 10px; text-align: center; }
        .cat-item { cursor: pointer; }
        .cat-icon { background: white; color: #ff5e00; width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .cat-item.active .cat-icon { background: #ff5e00; color: white; }
        .cat-item span { font-size: 13px; font-weight: 600; }

        /* প্রোডাক্ট গ্রিড */
        .product-section { padding: 0 15px; }
        .section-title { font-size: 19px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; }
        .section-title::before { content: ""; width: 5px; height: 20px; background: #ff5e00; margin-right: 10px; border-radius: 2px; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: white; border-radius: 20px; padding: 12px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.04); transition: 0.3s; border: 1px solid #f2f2f2; }
        .card img { width: 100%; border-radius: 15px; margin-bottom: 10px; }
        .card h3 { font-size: 14px; margin: 5px 0; height: 35px; overflow: hidden; color: #444; }
        .card .price { color: #ff5e00; font-weight: 700; font-size: 16px; }
        .add-btn { position: absolute; right: 10px; bottom: 10px; background: #ff5e00; color: white; width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }

        /* বটম ন্যাভিগেশন */
        .navbar { position: fixed; bottom: 0; width: 100%; background: white; height: 65px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); border-top-left-radius: 20px; border-top-right-radius: 20px; }
        .nav-item { color: #aaa; text-align: center; font-size: 12px; cursor: pointer; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }
        .nav-item.active { color: #ff5e00; }
    </style>

    <script>
        // আপনার ফায়ারবেস কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyDZ3rPr7ZmpvEVAs2bkGRgAuwSha9vm-Eg",
            authDomain: "stepupbd-211d1.firebaseapp.com",
            projectId: "stepupbd-211d1",
            storageBucket: "stepupbd-211d1.firebasestorage.app",
            messagingSenderId: "533863292447",
            appId: "1:533863292447:web:cf5946f03e9a8a32707f2a",
            databaseURL: "https://stepupbd-211d1-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function buyNow(pName, pPrice) {
            const customerName = prompt("আপনার নাম লিখুন:");
            const customerPhone = prompt("মোবাইল নম্বর লিখুন:");
            const customerAddress = prompt("পুরো ঠিকানা লিখুন:");

            if(customerName && customerPhone && customerAddress) {
                database.ref('orders').push({
                    name: customerName,
                    phone: customerPhone,
                    address: customerAddress,
                    product: pName,
                    price: pPrice,
                    time: new Date().toLocaleString()
                }).then(() => {
                    alert("SmartBD-তে আপনার অর্ডারটি সফল হয়েছে!");
                });
            } else {
                alert("সব তথ্য না দিলে অর্ডার হবে না।");
            }
        }
    </script>
</head>
<body>

<div class="header">
    <div class="header-top">
        <h1>SmartBD</h1>
        <i class="fa fa-shopping-cart" style="font-size: 22px;"></i>
    </div>
    <div class="search-container">
        <input type="text" placeholder="আপনার পছন্দের পণ্য খুঁজুন...">
        <i class="fa fa-search"></i>
    </div>
</div>

<div class="categories">
    <div class="cat-item active">
        <div class="cat-icon"><i class="fa fa-grid-2"></i></div>
        <span>All</span>
    </div>
    <div class="cat-item">
        <div class="cat-icon"><i class="fa fa-tshirt"></i></div>
        <span>Fashion</span>
    </div>
    <div class="cat-item">
        <div class="cat-icon"><i class="fa fa-futbol"></i></div>
        <span>Sports</span>
    </div>
    <div class="cat-item">
        <div class="cat-icon"><i class="fa fa-snowflake"></i></div>
        <span>Winter</span>
    </div>
</div>

<div class="product-section">
    <div class="section-title">ALL PRODUCT</div>
    <div class="grid">
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="Product">
            <h3>Premium Milano Drop Shoulder T-Shirt</h3>
            <div class="price">৳ ৫৫০</div>
            <div class="add-btn" onclick="buyNow('Milano T-Shirt', '550')"><i class="fa fa-plus"></i></div>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="Product">
            <h3>M10 TWS Wireless Earbuds</h3>
            <div class="price">৳ ৪৫০</div>
            <div class="add-btn" onclick="buyNow('M10 Earbuds', '450')"><i class="fa fa-plus"></i></div>
        </div>
    </div>
</div>

<div class="navbar">
    <div class="nav-item active"><i class="fa fa-home"></i><span>Home</span></div>
    <div class="nav-item"><i class="fa fa-shopping-bag"></i><span>Cart</span></div>
    <div class="nav-item"><i class="fa fa-truck"></i><span>Orders</span></div>
    <div class="nav-item"><i class="fa fa-user"></i><span>Account</span></div>
</div>

</body>
</html>
