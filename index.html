<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StepUpBD | শপিং</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // আপনার অরিজিনাল ফায়ারবেস কনফিগ
        const firebaseConfig = {
            apiKey: "AIzaSyDZ3rPr7ZmpvEVAs2bkGRgAuwSha9vm-Eg",
            authDomain: "stepupbd-211d1.firebaseapp.com",
            projectId: "stepupbd-211d1",
            storageBucket: "stepupbd-211d1.firebasestorage.app",
            messagingSenderId: "533863292447",
            appId: "1:533863292447:web:cf5946f03e9a8a32707f2a",
            databaseURL: "https://stepupbd-211d1-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function sendOrder() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;

            if(name && phone && address) {
                database.ref('orders').push({
                    customerName: name,
                    customerPhone: phone,
                    customerAddress: address,
                    product: "M10 TWS Earbuds",
                    time: new Date().toLocaleString()
                }).then(() => {
                    alert("অর্ডার সফল হয়েছে! আমরা আপনার সাথে যোগাযোগ করব।");
                    document.getElementById('orderForm').reset();
                }).catch((error) => {
                    alert("ত্রুটি: " + error.message);
                });
            } else {
                alert("দয়া করে সব তথ্য পূরণ করুন।");
            }
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .order-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 6px solid #003399; }
        h2 { color: #003399; text-align: center; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #003399; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #002266; }
    </style>
</head>
<body>
    <div class="order-card">
        <h2>StepUpBD</h2>
        <p style="text-align:center; color:#555;">M10 Earbuds - ৳ ৫৫০</p>
        <form id="orderForm">
            <input type="text" id="name" placeholder="আপনার নাম" required>
            <input type="text" id="phone" placeholder="মোবাইল নম্বর" required>
            <input type="text" id="address" placeholder="পুরো ঠিকানা (থানা, জেলা)" required>
            <button type="button" onclick="sendOrder()">অর্ডার কনফার্ম করুন</button>
        </form>
    </div>
</body>
</html>
