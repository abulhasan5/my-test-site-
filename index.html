<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBD | স্মার্ট শপিং</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        /* আপনার পছন্দের ব্লু-হোয়াইট থিম */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f0f4f8; color: #333; }
        .header { background: #003399; color: white; padding: 25px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 28px; letter-spacing: 1px; }
        .container { max-width: 500px; margin: 30px auto; padding: 15px; }
        .product-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid #003399; }
        .product-details { padding: 30px; text-align: center; }
        .product-details h2 { color: #003399; margin-top: 0; }
        .price { font-size: 26px; color: #e63946; font-weight: bold; margin: 15px 0; }
        
        /* অর্ডার ফর্ম ডিজাইন */
        .order-form { background: #f9f9f9; padding: 20px; border-radius: 12px; margin-top: 20px; text-align: left; }
        .order-form label { font-weight: bold; display: block; margin-bottom: 5px; color: #555; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #003399; outline: none; }
        .btn-confirm { background: #003399; color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.4s; }
        .btn-confirm:hover { background: #002266; transform: scale(1.02); }
    </style>

    <script>
        // আপনার ফায়ারবেস কনফিগ
        const firebaseConfig = {
            apiKey: "AIzaSyDZ3rPr7ZmpvEVAs2bkGRgAuwSha9vm-Eg",
            authDomain: "stepupbd-211d1.firebaseapp.com",
            projectId: "stepupbd-211d1",
            storageBucket: "stepupbd-211d1.firebasestorage.app",
            messagingSenderId: "533863292447",
            appId: "1:533863292447:web:cf5946f03e9a8a32707f2a",
            databaseURL: "https://stepupbd-211d1-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function placeOrder() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;

            if(name && phone && address) {
                database.ref('orders').push({
                    customerName: name,
                    customerPhone: phone,
                    customerAddress: address,
                    productName: "M10 TWS Earbuds",
                    shopName: "SmartBD",
                    orderTime: new Date().toLocaleString()
                }).then(() => {
                    alert("অভিনন্দন! আপনার অর্ডারটি SmartBD-তে গ্রহণ করা হয়েছে।");
                    document.getElementById('orderForm').reset();
                });
            } else {
                alert("দয়া করে আপনার নাম, মোবাইল নম্বর এবং ঠিকানা সঠিকভাবে দিন।");
            }
        }
    </script>
</head>
<body>

<div class="header">
    <h1>SmartBD (স্মার্ট বিডি)</h1>
    <p>আপনার আস্থার অনলাইন শপ</p>
</div>

<div class="container">
    <div class="product-card">
        <div class="product-details">
            <h2>M10 TWS Earbuds</h2>
            <p>হাই-কোয়ালিটি সাউন্ড এবং ডিজিটাল ডিসপ্লে ব্যাকআপ।</p>
            <div class="price">৳ ৫৫০</div>
            
            <div class="order-form">
                <h3 style="text-align:center; color:#333;">অর্ডার করতে নিচের তথ্যগুলো দিন</h3>
                <form id="orderForm">
                    <label>আপনার নাম:</label>
                    <input type="text" id="name" placeholder="যেমন: রহমত আলী" required>
                    
                    <label>মোবাইল নম্বর:</label>
                    <input type="text" id="phone" placeholder="যেমন: 017xxxxxxxx" required>
                    
                    <label>পূর্ণ ঠিকানা:</label>
                    <input type="text" id="address" placeholder="গ্রাম, থানা, জেলা" required>
                    
                    <button type="button" class="btn-confirm" onclick="placeOrder()">অর্ডার কনফার্ম করুন</button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
