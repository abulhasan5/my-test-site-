<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUY BD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #ff8000; --bg: #fdfdfd; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); padding-bottom: 70px; overflow-x: hidden; }

        /* হেডার ও সার্চ */
        .header { background: var(--primary); padding: 20px 15px; color: white; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; }
        .app-title { font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        .search-box { background: white; display: flex; align-items: center; padding: 12px 15px; border-radius: 12px; }
        .search-box input { border: none; outline: none; width: 100%; margin-left: 10px; font-size: 15px; color: #333; }

        /* ক্যাটাগরি ডিজাইন */
        .cat-row { display: flex; justify-content: space-around; padding: 15px; background: white; margin-bottom: 10px; }
        .cat-item { text-align: center; cursor: pointer; transition: 0.3s; }
        .cat-icon { width: 55px; height: 55px; border-radius: 15px; background: #fff; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--primary); margin-bottom: 5px; }
        .cat-item.active .cat-icon { background: var(--primary); color: white; border-color: var(--primary); }
        .cat-item span { font-size: 12px; color: #555; font-weight: 500; }

        /* প্রোডাক্ট গ্রিড */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .card { background: white; border-radius: 18px; padding: 10px; position: relative; border: 1px solid #f0f0f0; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .card img { width: 100%; height: 170px; object-fit: cover; border-radius: 14px; cursor: pointer; }
        .p-name { font-size: 14px; margin: 10px 0 5px 0; color: #333; height: 38px; overflow: hidden; font-weight: 600; line-height: 1.3; }
        .price-row { display: flex; align-items: center; gap: 6px; }
        .price { color: var(--primary); font-weight: 800; font-size: 16px; }
        .old-price { color: #bbb; text-decoration: line-through; font-size: 12px; }
        .plus-btn { position: absolute; bottom: 10px; right: 10px; background: var(--primary); color: white; width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; box-shadow: 0 4px 8px rgba(255,128,0,0.2); }

        /* কার্ট লিস্ট আইটেম */
        .cart-item { display: flex; align-items: center; background: white; margin: 12px; padding: 12px; border-radius: 16px; border: 1px solid #eee; }
        .cart-item img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; }
        .cart-info { flex: 1; margin-left: 15px; }
        .cart-info h4 { margin: 0; font-size: 15px; color: #333; }
        .cart-info p { margin: 4px 0 0; color: var(--primary); font-weight: bold; font-size: 16px; }
        .cart-meta { font-size: 11px; color: #888; margin-top: 3px; }
        .remove-btn { color: #ff4d4d; font-size: 18px; padding: 10px; cursor: pointer; }

        /* বিস্তারিত মডাল (পপআপ) */
        .details-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index: 3000; overflow-y: auto; }
        .modal-body { padding: 15px; }
        .close-modal { font-size: 24px; color: #333; cursor: pointer; padding: 10px 0; display: block; }
        .size-btn, .color-btn { border: 1.5px solid #eee; padding: 10px 20px; border-radius: 12px; cursor: pointer; display: inline-block; margin: 8px 8px 0 0; font-size: 14px; background: #fafafa; transition: 0.2s; }
        .selected { border-color: var(--primary); color: var(--primary); background: #fff5eb; font-weight: bold; box-shadow: 0 2px 6px rgba(255,128,0,0.1); }

        /* বটম নেভিগেশন */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.06); z-index: 1000; }
        .nav-tab { text-align: center; color: #bbb; flex: 1; font-size: 12px; cursor: pointer; }
        .nav-tab.active { color: var(--primary); font-weight: 700; }
        .nav-tab i { font-size: 24px; margin-bottom: 4px; }

        .page { display: none; padding-bottom: 20px; }
        .active-page { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="home" class="page active-page">
        <div class="header">
            <div class="app-title">BUY BD</div>
            <div class="search-box"><i class="fa fa-search" style="color:#aaa"></i><input type="text" placeholder="পণ্য খুঁজুন..." onkeyup="searchProduct(this.value)"></div>
        </div>
        <div class="cat-row">
            <div class="cat-item active" onclick="filterCat('All', this)"><div class="cat-icon"><i class="fa fa-th-large"></i></div><span>All</span></div>
            <div class="cat-item" onclick="filterCat('Fashion', this)"><div class="cat-icon"><i class="fa fa-tshirt"></i></div><span>Fashion</span></div>
            <div class="cat-item" onclick="filterCat('Sports', this)"><div class="cat-icon"><i class="fa fa-football-ball"></i></div><span>Sports</span></div>
            <div class="cat-item" onclick="filterCat('Winter', this)"><div class="cat-icon"><i class="fa fa-snowflake"></i></div><span>Winter</span></div>
        </div>
        <div style="padding: 10px 15px; font-weight: bold; font-size: 18px; border-left: 4px solid var(--primary); margin-left: 12px;">ALL PRODUCT</div>
        <div class="grid" id="productGrid"></div>
    </div>

    <div id="cart" class="page">
        <div class="header" style="padding: 15px;"><div class="app-title">আপনার কার্ট</div></div>
        <div id="cartList"></div>
        <div id="emptyCart" style="text-align: center; padding: 120px 20px; display: none;">
            <img src="https://cdn-icons-png.flaticon.com/512/11329/11329974.png" width="100" style="opacity: 0.1;">
            <p style="color: #999; margin-top: 20px;">আপনার কার্ট বর্তমানে খালি আছে</p>
            <button onclick="showPage('home')" style="background: var(--primary); color: white; border: none; padding: 12px 40px; border-radius: 30px; font-weight: bold; margin-top: 10px;">কেনাকাটা শুরু করুন</button>
        </div>
        <div id="cartFooter" style="padding: 20px; position: sticky; bottom: 0; background: white; border-top: 1px solid #eee; display: none;">
            <div style="display: flex; justify-content: space-between; font-size: 19px; font-weight: 800; margin-bottom: 20px;">
                <span>মোট বিল:</span>
                <span id="totalAmount" style="color: var(--primary);">৳ 0</span>
            </div>
            <button onclick="alert('অর্ডার সিস্টেম শীঘ্রই আপডেট করা হবে!')" style="width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 16px; font-size: 17px; font-weight: bold; box-shadow: 0 6px 15px rgba(255,128,0,0.3);">অর্ডার সম্পন্ন করুন</button>
        </div>
    </div>

    <div id="detailsModal" class="details-modal">
        <div class="modal-body">
            <i class="fa fa-arrow-left close-modal" onclick="closeDetails()"></i>
            <img id="detImg" src="" style="width:100%; border-radius:20px; height: 350px; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
            <h2 id="detTitle" style="margin: 25px 0 10px 0; font-size: 22px;"></h2>
            <h3 id="detPrice" style="color:var(--primary); font-size: 26px; margin: 0;"></h3>
            
            <div id="colorContainer">
                <p style="font-weight: bold; margin-top: 25px;">রঙ নির্বাচন করুন:</p>
                <div id="colorList"></div>
            </div>
            
            <div id="sizeContainer">
                <p style="font-weight: bold; margin-top: 20px;">আকার নির্বাচন করুন:</p>
                <div id="sizeList"></div>
            </div>

            <button id="mainActionBtn" style="width:100%; padding:18px; background:var(--primary); color:white; border:none; border-radius:18px; margin-top:35px; font-weight:bold; font-size: 17px; box-shadow: 0 6px 20px rgba(255,128,0,0.4);">কার্টে যোগ করুন</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-tab active" id="nav-home" onclick="showPage('home')"><i class="fa fa-home"></i><br>Home</div>
        <div class="nav-tab" id="nav-cart" onclick="showPage('cart')"><i class="fa fa-shopping-bag"></i><br>Cart</div>
        <div class="nav-tab" id="nav-account" onclick="showPage('account')"><i class="fa fa-user-circle"></i><br>Account</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDZ3rPr7ZmpvEVAs2bkGRgAuwSha9vm-Eg",
            authDomain: "stepupbd-211d1.firebaseapp.com",
            databaseURL: "https://stepupbd-211d1-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myCart = [];
        let tempColor = "";
        let tempSize = "";

        // ১. প্রোডাক্ট লোড করা
        function loadProducts() {
            db.ref('products').on('value', (snapshot) => {
                const grid = document.getElementById('productGrid');
                grid.innerHTML = "";
                snapshot.forEach(child => {
                    const p = child.val();
                    const image = p.img || p.image || 'https://via.placeholder.com/150';
                    const colors = p.color || ""; 
                    const sizes = p.size || "";

                    grid.innerHTML += `
                        <div class="card">
                            <img src="${image}" onclick="openModal('${p.name}', '${p.salePrice}', '${image}', '${colors}', '${sizes}')">
                            <div class="plus-btn" onclick="openModal('${p.name}', '${p.salePrice}', '${image}', '${colors}', '${sizes}')">+</div>
                            <div class="p-name">${p.name}</div>
                            <div class="price-row">
                                <span class="price">৳${p.salePrice}</span>
                                <span class="old-price">৳${parseInt(p.salePrice)+100}</span>
                            </div>
                        </div>`;
                });
            });
        }

        // ২. মডাল ওপেন লজিক (Undefined ফিক্সড)
        function openModal(name, price, img, colors, sizes) {
            tempColor = ""; tempSize = "";
            document.getElementById('detTitle').innerText = name;
            document.getElementById('detPrice').innerText = '৳ ' + price;
            document.getElementById('detImg').src = img;

            // কালার সেকশন
            const cList = document.getElementById('colorList');
            cList.innerHTML = "";
            if (colors && colors.trim() !== "" && colors !== "undefined") {
                document.getElementById('colorContainer').style.display = "block";
                colors.split(',').forEach(c => {
                    cList.innerHTML += `<div class="color-btn" onclick="selectAttr(this, 'color', '${c.trim()}')">${c.trim()}</div>`;
                });
            } else {
                document.getElementById('colorContainer').style.display = "none";
            }

            // সাইজ সেকশন
            const sList = document.getElementById('sizeList');
            sList.innerHTML = "";
            if (sizes && sizes.trim() !== "" && sizes !== "undefined") {
                document.getElementById('sizeContainer').style.display = "block";
                sizes.split(',').forEach(s => {
                    sList.innerHTML += `<div class="size-btn" onclick="selectAttr(this, 'size', '${s.trim()}')">${s.trim()}</div>`;
                });
            } else {
                document.getElementById('sizeContainer').style.display = "none";
            }

            document.getElementById('mainActionBtn').onclick = () => addToCart(name, price, img);
            document.getElementById('detailsModal').style.display = 'block';
        }

        function selectAttr(el, type, val) {
            const selector = type === 'color' ? '.color-btn' : '.size-btn';
            document.querySelectorAll(selector).forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
            if(type === 'color') tempColor = val; else tempSize = val;
        }

        // ৩. কার্ট সিস্টেম
        function addToCart(name, price, img) {
            myCart.push({ name, price: parseInt(price), img, color: tempColor, size: tempSize });
            updateCart();
            closeDetails();
            alert("কার্টে যোগ করা হয়েছে!");
        }

        function updateCart() {
            const list = document.getElementById('cartList');
            const footer = document.getElementById('cartFooter');
            const empty = document.getElementById('emptyCart');
            const totalText = document.getElementById('totalAmount');

            if(myCart.length === 0) {
                list.innerHTML = ""; footer.style.display = "none"; empty.style.display = "block";
                return;
            }

            empty.style.display = "none";
            footer.style.display = "block";
            list.innerHTML = "";
            let sum = 0;

            myCart.forEach((item, i) => {
                sum += item.price;
                list.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}">
                        <div class="cart-info">
                            <h4>${item.name}</h4>
                            <div class="cart-meta">
                                ${item.color ? 'রঙ: '+item.color : ''} ${item.size ? ' | সাইজ: '+item.size : ''}
                            </div>
                            <p>৳${item.price}</p>
                        </div>
                        <i class="fa fa-trash-alt remove-btn" onclick="removeCartItem(${i})"></i>
                    </div>`;
            });
            totalText.innerText = "৳ " + sum;
        }

        function removeCartItem(index) {
            myCart.splice(index, 1);
            updateCart();
        }

        // ৪. পেজ ও সার্চ কন্ট্রোল
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
            window.scrollTo(0,0);
        }

        function filterCat(cat, el) {
            document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            db.ref('products').once('value', (snap) => {
                const grid = document.getElementById('productGrid');
                grid.innerHTML = "";
                snap.forEach(child => {
                    const p = child.val();
                    if(cat === 'All' || p.category === cat) {
                        const image = p.img || p.image;
                        grid.innerHTML += `<div class="card"><img src="${image}" onclick="openModal('${p.name}', '${p.salePrice}', '${image}', '${p.color}', '${p.size}')"><div class="plus-btn">+</div><div class="p-name">${p.name}</div><div class="price">৳${p.salePrice}</div></div>`;
                    }
                });
            });
        }

        function searchProduct(v) {
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(v.toLowerCase()) ? "block" : "none";
            });
        }

        function closeDetails() { document.getElementById('detailsModal').style.display = 'none'; }

        window.onload = loadProducts;
    </script>
</body>
</html>
