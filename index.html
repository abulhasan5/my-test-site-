    <style>
        /* কালার ভেরিয়েবল পরিবর্তন - গাড় নীল রঙ */
        :root { --primary: #0d47a1; --bg: #f8f9fa; --red: #d32f2f; --green: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }
        
        .header { background: var(--primary); padding: 15px 15px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; box-shadow: 0 4px 15px rgba(13, 71, 161, 0.2); }
        .brand-name { color: white; font-size: 24px; font-weight: 800; margin-bottom: 12px; display: block; letter-spacing: 1px; }
        .search-container { position: relative; }
        .search-container input { width: 100%; padding: 12px 40px; border-radius: 12px; border: none; box-sizing: border-box; font-size: 14px; outline: none; }
        /* সার্চ আইকন কালার গাড় নীল */
        .search-container i { position: absolute; left: 12px; top: 12px; color: var(--primary); font-size: 16px; }

        .banner { margin: 15px; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.08); background: white; }
        .banner img { width: 100%; display: block; max-height: 160px; object-fit: cover; }

        /* ক্যাটাগরি আইকন এবং টেক্সট গাড় নীল */
        .categories { display: flex; justify-content: space-around; padding: 10px 5px; margin-top: 5px; }
        .cat-item { text-align: center; font-size: 11px; font-weight: 600; color: #555; }
        .cat-icon { width: 50px; height: 50px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 6px; box-shadow: 0 3px 8px rgba(0,0,0,0.05); color: var(--primary); font-size: 20px; transition: 0.3s; }
        .cat-icon.active { background: var(--primary); color: white; box-shadow: 0 5px 12px rgba(13, 71, 161, 0.3); }

        .section-title { margin: 15px 15px 12px; font-size: 17px; font-weight: bold; color: #333; display: flex; align-items: center; text-transform: uppercase; }
        /* টাইটেল ইন্ডিকেটর গাড় নীল */
        .section-title::before { content: ""; width: 4px; height: 18px; background: var(--primary); margin-right: 8px; border-radius: 2px; }

        /* প্রোডাক্ট কার্ড স্টাইল হুবহু স্ক্রিনশটের মতো */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 12px; }
        .product-card { background: white; border-radius: 15px; padding: 8px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid #eee; display: flex; flex-direction: column; }
        .product-card img { width: 100%; height: 130px; object-fit: cover; border-radius: 12px; margin-bottom: 6px; }
        
        /* স্টক ব্যাজ */
        .stock-badge { position: absolute; top: 12px; right: 12px; padding: 3px 6px; border-radius: 6px; font-size: 9px; font-weight: bold; color: white; text-transform: uppercase; }
        .in-stock { background: var(--green); }
        .out-stock { background: var(--red); }

        .product-card h3 { font-size: 12px; margin: 4px 0; height: 30px; overflow: hidden; color: #222; line-height: 1.2; font-weight: 600; }
        
        .price-container { margin-top: 3px; }
        .reg-price { color: #888; text-decoration: line-through; font-size: 11px; margin-right: 4px; }
        /* প্রাইস টেক্সট গাড় নীল */
        .sale-price { color: var(--primary); font-weight: 800; font-size: 15px; }

        /* বিবরণ বাটন গাড় নীল টেক্সট */
        .desc-btn { background: #eaeffa; color: var(--primary); border: none; padding: 5px; border-radius: 6px; font-size: 10px; margin-top: 6px; cursor: pointer; width: 100%; font-weight: bold; }

        /* বাই বাটন গাড় নীল ব্যাকগ্রাউন্ড */
        .buy-btn { background: var(--primary); color: white; border: none; padding: 8px; border-radius: 8px; margin-top: 6px; font-weight: bold; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .buy-btn:active { transform: scale(0.95); }

        /* বটম নেভিগেশন গাড় নীল আইকন */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); border-top-left-radius: 15px; border-top-right-radius: 15px; z-index: 100; }
        .nav-item { text-align: center; color: #a0a0a0; font-size: 10px; text-decoration: none; transition: 0.3s; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 3px; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
    </style>
