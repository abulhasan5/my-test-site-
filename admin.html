<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBD Admin | Upload</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #fdfaf7; padding: 20px; }
        .box { background: white; max-width: 400px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 5px solid #ff5e00; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #ff5e00; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #msg { text-align: center; color: #ff5e00; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="text-align:center; color:#333;">SmartBD Admin</h2>
        <p style="font-size:13px; color:#666;">পণ্য আপলোড করুন সরাসরি গ্যালারি থেকে:</p>
        <input type="file" id="pic" accept="image/*">
        <input type="text" id="name" placeholder="পণ্যের নাম">
        <input type="text" id="price" placeholder="দাম (৳)">
        <button onclick="upload()">সরাসরি আপলোড করুন</button>
        <div id="msg"></div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyDZ3rPr7ZmpvEVAs2bkGRgAuwSha9vm-Eg",
            authDomain: "stepupbd-211d1.firebaseapp.com",
            projectId: "stepupbd-211d1",
            storageBucket: "stepupbd-211d1.appspot.com",
            databaseURL: "https://stepupbd-211d1-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const st = firebase.storage();

        async function upload() {
            const file = document.getElementById('pic').files[0];
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            const msg = document.getElementById('msg');

            if(!file || !name || !price) return alert("সব ঘর পূরণ করুন!");
            msg.innerText = "আপলোড হচ্ছে...";

            try {
                const ref = st.ref('products/' + Date.now() + file.name);
                await ref.put(file);
                const url = await ref.getDownloadURL();
                await db.ref('products').push({ name, price, img: url });
                msg.innerText = "সফলভাবে আপলোড হয়েছে!";
                setTimeout(() => location.reload(), 2000);
            } catch(e) { msg.innerText = "ব্যর্থ হয়েছে! Storage Rules চেক করুন।"; }
        }
    </script>
</body>
</html>
