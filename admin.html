<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART BD Admin | Fixed Version</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0d47a1; --light-bg: #f8f9fa; --red: #d32f2f; --green: #2e7d32; --orange: #ef6c00; --blue: #1976d2; --purple: #7b1fa2; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light-bg); margin: 0; padding-bottom: 30px; }
        .header { background: white; padding: 15px 20px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-bottom: 4px solid var(--primary); }
        .total-card { grid-column: span 2; background: var(--primary); color: white; border: none; padding: 25px; }
        .section { display: none; padding: 20px; background: white; margin: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .active { display: block; }
        
        /* স্ট্যাটাস বাটন ও ইমেজ ফিক্স */
        .status-badge { padding: 4px 10px; border-radius: 5px; font-size: 10px; font-weight: bold; color: white; display: inline-block; margin-bottom: 8px; text-transform: uppercase; }
        .pending { background: var(--orange); }
        .booking { background: var(--purple); }
        .processing { background: var(--blue); }
        .delivered { background: var(--green); }
        
        .p-img { width: 55px; height: 55px; object-fit: cover; border-radius: 10px; background: #f0f0f0; margin-right: 12px; border: 1px solid #eee; }
        .list-item { background: #fff; border: 1px solid #f0f0f0; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .order-box { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--orange); }
        .btn-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .s-btn { border: none; padding: 6px 10px; border-radius: 6px; color: white; font-size: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; }
    </style>
</head>
<body>

<div class="header">
    <i class="fa fa-bars" style="font-size: 20px; color: var(--primary); margin-right: 15px;"></i>
    <b style="color: var(--primary); font-size: 18px;">SMART BD Admin</b>
</div>

<div class="stats">
    <div class="card total-card"><small>Total Delivered Sales</small><h2 id="totalSales">৳ 0</h2></div>
    <div class="card"><h2 id="pCount">0</h2><small>পণ্য</small></div>
    <div class="card"><h2 id="oCount">0</h2><small>অর্ডার</small></div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px;">
    <div onclick="show('upSec')" style="background:white; padding:20px; border-radius:15px; text-align:center; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
        <i class="fa fa-plus-circle" style="color:var(--primary); font-size:22px;"></i><br><small>Add Item</small>
    </div>
    <div onclick="show('orderSec')" style="background:white; padding:20px; border-radius:15px; text-align:center; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
        <i class="fa fa-shopping-cart" style="color:var(--primary); font-size:22px;"></i><br><small>Orders</small>
    </div>
</div>

<div id="orderSec" class="section active">
    <h3 style="margin-top:0;">অর্ডার রিকোয়েস্ট</h3>
    <div id="orderList">লোড হচ্ছে...</div>
</div>

<div id="manageSec" class="section active">
    <h3 style="margin-top:0;">পণ্য ম্যানেজ করুন</h3>
    <div id="productList">লোড হচ্ছে...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const config = {
        apiKey: "AIzaSyDZ3rPr7ZmpvEVAs2bkGRgAuwSha9vm-Eg",
        authDomain: "stepupbd-211d1.firebaseapp.com",
        projectId: "stepupbd-211d1",
        storageBucket: "stepupbd-211d1.appspot.com",
        databaseURL: "https://stepupbd-211d1-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(config);
    const db = firebase.database();

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // অর্ডার লিস্ট এবং স্ট্যাটাস ফিক্স
    db.ref("orders").on("value", snap => {
        const list = document.getElementById('orderList');
        let total = 0;
        list.innerHTML = "";
        snap.forEach(child => {
            const o = child.val();
            const st = o.status || 'Pending';
            if(st === 'Delivered') total += parseInt(o.price || 0);
            
            let bColor = 'var(--orange)';
            if(st === 'Booking') bColor = 'var(--purple)';
            if(st === 'Processing') bColor = 'var(--blue)';
            if(st === 'Delivered') bColor = 'var(--green)';
            
            list.innerHTML += `
            <div class="order-box" style="border-left-color: ${bColor}">
                <span class="status-badge ${st.toLowerCase()}">${st}</span><br>
                <b style="font-size:15px;">${o.product}</b><br>
                <small>কাস্টমার: ${o.customer}</small>
                <div class="btn-group">
                    <button class="s-btn" onclick="updateSt('${child.key}', 'Pending')" style="background:var(--orange)">Pending</button>
                    <button class="s-btn" onclick="updateSt('${child.key}', 'Booking')" style="background:var(--purple)">Booking</button>
                    <button class="s-btn" onclick="updateSt('${child.key}', 'Processing')" style="background:var(--blue)">Processing</button>
                    <button class="s-btn" onclick="updateSt('${child.key}', 'Delivered')" style="background:var(--green)">Delivered</button>
                </div>
            </div>`;
        });
        document.getElementById('totalSales').innerText = "৳ " + total;
        document.getElementById('oCount').innerText = snap.numChildren();
    });

    function updateSt(key, status) {
        db.ref("orders/" + key).update({ status: status });
    }

    // প্রোডাক্ট লিস্ট ও ইমেজ ডিসপ্লে ফিক্স
    db.ref("products").on("value", snap => {
        const list = document.getElementById('productList');
        list.innerHTML = "";
        snap.forEach(child => {
            const p = child.val();
            // ডাটাবেসে img অথবা image যে নামেই থাকুক ছবি দেখাবে
            const imgSource = p.img || p.image || p.imgUrl || "";
            
            list.innerHTML += `
            <div class="list-item">
                <div style="display:flex; align-items:center;">
                    <img src="${imgSource}" class="p-img" onerror="this.src='https://via.placeholder.com/60?text=No+Img'">
                    <div><b>${p.name}</b><br><small>${p.salePrice}৳</small></div>
                </div>
                <i class="fa fa-trash" style="color:var(--red); padding:10px;" onclick="del('products/${child.key}')"></i>
            </div>`;
        });
        document.getElementById('pCount').innerText = snap.numChildren();
    });

    function del(path) { if(confirm("Are you sure?")) db.ref(path).remove(); }
</script>
</body>
</html>
