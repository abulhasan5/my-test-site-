<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<script>
// ১. ফায়ারবেস কনফিগারেশন
const config = {
    apiKey: "AIzaSyD23rPr72npvtYsZBkoK4uvsh8VneLg",
    authDomain: "stepupbd-211d1.firebaseapp.com",
    projectId: "stepupbd-211d1",
    storageBucket: "stepupbd-211d1.appspot.com",
    databaseURL: "https://stepupbd-211d1-default-rtdb.firebaseio.com"
};
firebase.initializeApp(config);
const db = firebase.database();
const st = firebase.storage();

// ২. মেনু কন্ট্রোল (Sidebar Toggle)
function toggleMenu() {
    var menu = document.getElementById('sideMenu');
    if (menu.style.left === '0px' || menu.style.left === '0') {
        menu.style.left = '-250px';
    } else {
        menu.style.left = '0px';
    }
}

// ৩. সেকশন পরিবর্তন (অত্যন্ত নিখুঁত লজিক)
function showSection(id) {
    var sections = document.querySelectorAll('.section');
    sections.forEach(function(sec) {
        sec.style.display = 'none'; // সব বন্ধ হবে
    });
    var target = document.getElementById(id);
    if(target) {
        target.style.display = 'block'; // শুধু কাঙ্ক্ষিতটি খুলবে
    }
    window.scrollTo(0,0);
}

// ৪. পণ্য লোড করা (Realtime)
db.ref("products").on("value", snap => {
    const pCount = document.getElementById('pCount');
    if(pCount) pCount.innerText = snap.numChildren();
    
    const list = document.getElementById('productList');
    if(list) {
        list.innerHTML = "";
        snap.forEach(child => {
            const p = child.val();
            list.innerHTML += `
                <div class="list-item" style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                    <span>${p.name}</span> 
                    <i class="fa fa-trash" style="color:red; cursor:pointer;" onclick="del('products/${child.key}')"></i>
                </div>`;
        });
    }
}, error => {
    console.log("Error loading products: ", error);
});

// ৫. অর্ডার লোড করা
db.ref("orders").on("value", snap => {
    const oCount = document.getElementById('oCount');
    if(oCount) oCount.innerText = snap.numChildren();
    
    const list = document.getElementById('orderList');
    if(list) {
        list.innerHTML = "";
        snap.forEach(child => {
            const o = child.val();
            list.innerHTML += `<div class="list-item"><b>${o.product || 'Order'}</b><br><small>${o.customer || 'Guest'}</small></div>`;
        });
    }
});

// ৬. পণ্য আপলোড করার ফাংশন
async function upload() {
    const file = document.getElementById('file').files[0];
    const name = document.getElementById('name').value;
    const price = document.getElementById('price').value;
    const msg = document.getElementById('upMsg');

    if(!file || !name || !price) {
        alert("দয়া করে ছবি, নাম এবং দাম সবগুলো দিন!");
        return;
    }

    msg.innerText = "আপলোড হচ্ছে, দয়া করে অপেক্ষা করুন...";
    
    try {
        const fileName = Date.now() + "_" + file.name;
        const ref = st.ref("products/" + fileName);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        
        await db.ref("products").push({
            name: name,
            price: price,
            img: url,
            time: Date.now()
        });
        
        alert("সফলভাবে আপলোড হয়েছে!");
        location.reload();
    } catch(e) {
        alert("ভুল হয়েছে: " + e.message);
        msg.innerText = "আবার চেষ্টা করুন";
    }
}

// ৭. ডিলিট ফাংশন
function del(path) {
    if(confirm("আপনি কি নিশ্চিতভাবে এটি ডিলিট করতে চান?")) {
        db.ref(path).remove()
            .then(() => alert("সফলভাবে ডিলিট হয়েছে!"))
            .catch(err => alert("এরর: " + err.message));
    }
}
</script>
</body>
</html>
