<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্মার্ট বিডি | এডমিন প্যানেল</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        // আপনার লগইন তথ্য
        const adminUser = "admin";
        const adminPass = "1234"; 
        
        // আপনার ImgBB API Key (আমি এটি আপনার স্ক্রিনশট থেকে সেট করে দিয়েছি)
        const imgbbAPIKey = "731292c652d83dcee73104449cca7531"; 

        function checkLogin() {
            const user = prompt("ইউজারনেম দিন:");
            const pass = prompt("পাসওয়ার্ড দিন:");
            if (user === adminUser && pass === adminPass) {
                document.getElementById('adminContent').style.display = "block";
            } else {
                alert("ভুল তথ্য! আবার চেষ্টা করুন।");
                window.location.href = "index.html";
            }
        }

        async function uploadImage() {
            const fileInput = document.getElementById('imageFile');
            const file = fileInput.files[0];
            const statusText = document.getElementById('uploadStatus');

            if (!file) {
                alert("দয়া করে গ্যালারি থেকে একটি ছবি বেছে নিন।");
                return;
            }

            statusText.innerText = "ছবি আপলোড হচ্ছে, দয়া করে অপেক্ষা করুন...";
            statusText.style.color = "blue";

            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbAPIKey}`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    const imageUrl = result.data.url;
                    document.getElementById('imageUrl').value = imageUrl;
                    statusText.innerText = "অভিনন্দন! ছবি সফলভাবে আপলোড হয়েছে।";
                    statusText.style.color = "green";
                } else {
                    statusText.innerText = "ছবি আপলোড হয়নি। আপনার API Key ঠিক আছে তো?";
                    statusText.style.color = "red";
                }
            } catch (error) {
                console.error('Error:', error);
                statusText.innerText = "সার্ভারে সমস্যা হচ্ছে, আবার চেষ্টা করুন।";
                statusText.style.color = "red";
            }
        }
    </script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f0f4f8; }
        #adminContent { display: none; }
        .header { background: #003399; color: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h3 { color: #003399; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        
        label { font-weight: bold; color: #555; display: block; margin-top: 15px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 100px; resize: vertical; }
        
        .upload-btn { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%;}
        .publish-btn { background: #003399; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .publish-btn:hover { background: #002570; }
        #uploadStatus { margin-top: 5px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body onload="checkLogin()">

<div id="adminContent">
    <div class="header">
        <h1><i class="fa fa-user-shield"></i> স্মার্ট বিডি এডমিন প্যানেল</h1>
    </div>

    <div class="container">
        <div class="card">
            <h3><i class="fa fa-cart-plus"></i> নতুন পণ্য যোগ করুন</h3>
            
            <label>পণ্যের নাম:</label>
            <input type="text" id="productName" placeholder="যেমন: M10 ইয়ারবাডস">

            <label>পণ্যের দাম (টাকা):</label>
            <input type="number" id="productPrice" placeholder="যেমন: ৫৫০">

            <label>গ্যালারি থেকে ছবি বেছে নিন:</label>
            <input type="file" id="imageFile" accept="image/*">
            <button type="button" class="upload-btn" onclick="uploadImage()">ছবি আপলোড করুন</button>
            <p id="uploadStatus"></p>
            
            <input type="hidden" id="imageUrl"> 

            <label>পণ্যের বিস্তারিত বিবরণ:</label>
            <textarea id="productDesc" placeholder="পণ্যটি সম্পর্কে বিস্তারিত লিখুন..."></textarea>

            <button class="publish-btn" onclick="alert('প্রোডাক্ট সেভ হয়েছে! এখন ডাটাবেজ সেট করলেই আপনার ওয়েবসাইটে দেখা যাবে।')">
                <i class="fa fa-paper-plane"></i> পাবলিশ করুন
            </button>
        </div>
    </div>
</div>

</body>
</html>
